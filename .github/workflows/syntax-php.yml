name: PHP Syntax

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax_php:
    name: PHP Syntax ${{ matrix.php-versions }}
    runs-on: [ubuntu-latest]

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Get last successful commit
        id: last-successful-commit
        uses: SamhammerAG/last-successful-build-action@c32fe86b51dd1479ea281d29767d09288458d120 # v7
        with:
          branch: main
          workflow: ${{ github.workflow }}
          verify: true

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          base_sha: ${{ steps.last-successful-commit.outputs.sha }}
          files: |
            **/*.{php,phtml}

      - name: Setup PHP
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-versions }}
          ini-values: error_reporting=E_ALL, short_open_tag=Off
          tools: none

      - name: Check changed files
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: |
          set +e
          ERROR=0
          for FILE in ${{ steps.changed-files.outputs.all_changed_files }}; do
              MESSAGE=$(php -l "$FILE" 2>&1 1>/dev/null)
              if [ $? -ne 0 ]; then
                  ERROR=255
                  LINE=$(echo $MESSAGE | sed -En 's/.*on line ([0-9]+).*/\1/p')
                  echo "::error file=$FILE,line=$LINE::$MESSAGE"
              fi
          done
          exit $ERROR
