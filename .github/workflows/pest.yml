name: Pest Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pest-db:
    name: Test Suite (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mysql-8.4
            db_engine: mysql
            db_image: mysql:8.4
            db_user: root
            db_pass: root
            health_cmd: mysqladmin ping
            db_command: --log-bin --gtid-mode=ON --enforce-gtid-consistency=ON
          - name: mysql-latest
            db_engine: mysql
            db_image: mysql:latest
            db_user: root
            db_pass: root
            health_cmd: mysqladmin ping
            db_command: --log-bin --gtid-mode=ON --enforce-gtid-consistency=ON
          - name: mariadb-10.11
            db_engine: mysql
            db_image: mariadb:10.11
            db_user: root
            db_pass: root
            health_cmd: healthcheck.sh --connect --innodb_initialized
            db_command: --skip-name-resolve
          - name: mariadb-latest
            db_engine: mysql
            db_image: mariadb:latest
            db_user: root
            db_pass: root
            health_cmd: healthcheck.sh --connect --innodb_initialized
            db_command: --skip-name-resolve
          - name: pgsql-14
            db_engine: pgsql
            db_image: postgres:14
            db_user: postgres
            db_pass: postgres
            health_cmd: pg_isready
            db_command: postgres
          - name: pgsql-latest
            db_engine: pgsql
            db_image: postgres:latest
            db_user: postgres
            db_pass: postgres
            health_cmd: pg_isready
            db_command: postgres

    services:
      db:
        image: ${{ matrix.db_image }}
        command: ${{ matrix.db_command }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: maho
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: maho
        ports:
          - ${{ contains(matrix.db_image, 'postgres') && '5432:5432' || '3306:3306' }}
        options: >-
          --health-cmd="${{ matrix.health_cmd }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.3
          extensions: ${{ matrix.db_engine == 'pgsql' && 'pdo_pgsql' || '' }}

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Browser tests (tests/Browser) need Playwright; the plugin aborts the whole run if it
      # is missing, so install it up front in every job.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: Install Playwright
        run: |
          npm install playwright@^1.60.0
          npx playwright install --with-deps chromium

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-*

      - name: Print DB version
        run: docker exec $(docker ps -q) sh -c "mysql --version 2>/dev/null || psql --version 2>/dev/null || mariadb --version 2>/dev/null"

      - name: Detect runner IP (browser host)
        run: echo "MAHO_BROWSER_HOST=$(hostname -I | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Install Maho
        run: |
          ./maho install \
            --license_agreement_accepted yes \
            --locale en_US \
            --timezone Europe/London \
            --default_currency USD \
            --db_host 127.0.0.1 \
            --db_name maho \
            --db_user ${{ matrix.db_user }} \
            --db_pass ${{ matrix.db_pass }} \
            --db_engine ${{ matrix.db_engine }} \
            --url "http://$MAHO_BROWSER_HOST:8901/" \
            --secure_base_url "http://$MAHO_BROWSER_HOST:8901/" \
            --use_secure 0 \
            --use_secure_admin 0 \
            --admin_lastname admin \
            --admin_firstname admin \
            --admin_email admin@admin.com \
            --admin_username admin \
            --admin_password asdasdasd123123123 \
            --sample_data 1
          ./maho index:reindex:all
          ./maho cache:flush

      - name: Start built-in web server
        run: |
          php -S 127.0.0.1:8080 -t public > /tmp/php-server.log 2>&1 < /dev/null &
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/api/rest/v2/store-config -o /dev/null 2>&1 || \
               curl -fsS http://127.0.0.1:8080/ -o /dev/null 2>&1; then
              echo "Web server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Web server did not start in time"
          cat /tmp/php-server.log
          exit 1

      - name: Configure PayPal sandbox credentials
        run: |
          if [ -z "$PAYPAL_SANDBOX_CLIENT_ID" ] || [ -z "$PAYPAL_SANDBOX_CLIENT_SECRET" ]; then
            echo "PayPal sandbox credentials unavailable (e.g. a fork PR); leaving PayPal unconfigured so its tests skip."
            exit 0
          fi
          ./maho config:set paypal/credentials/client_id "$PAYPAL_SANDBOX_CLIENT_ID" --encrypt --scope default --scope-id 0 --silent >/dev/null
          ./maho config:set paypal/credentials/client_secret "$PAYPAL_SANDBOX_CLIENT_SECRET" --encrypt --scope default --scope-id 0 --silent >/dev/null
          ./maho config:set paypal/credentials/sandbox 1 --scope default --scope-id 0 --silent
          ./maho config:set payment/paypal_standard_checkout/active 1 --scope default --scope-id 0 --silent
          ./maho config:set payment/paypal_advanced_checkout/active 1 --scope default --scope-id 0 --silent
          ./maho cache:flush
        env:
          PAYPAL_SANDBOX_CLIENT_ID: ${{ secrets.PAYPAL_SANDBOX_CLIENT_ID }}
          PAYPAL_SANDBOX_CLIENT_SECRET: ${{ secrets.PAYPAL_SANDBOX_CLIENT_SECRET }}

      - name: Run Pest Tests
        env:
          API_BASE_URL: http://127.0.0.1:8080
          PAYPAL_SANDBOX_CLIENT_ID: ${{ secrets.PAYPAL_SANDBOX_CLIENT_ID }}
          PAYPAL_SANDBOX_CLIENT_SECRET: ${{ secrets.PAYPAL_SANDBOX_CLIENT_SECRET }}
        run: ./vendor/bin/pest --display-errors --display-warnings

  pest-sqlite:
    name: Test Suite (sqlite)
    runs-on: ubuntu-latest

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.3
          extensions: pdo_sqlite

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: Install Playwright
        run: |
          npm install playwright@^1.60.0
          npx playwright install --with-deps chromium

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-*

      - name: Detect runner IP (browser host)
        run: echo "MAHO_BROWSER_HOST=$(hostname -I | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Install Maho
        run: |
          ./maho install \
            --license_agreement_accepted yes \
            --locale en_US \
            --timezone Europe/London \
            --default_currency USD \
            --db_name maho.sqlite \
            --db_engine sqlite \
            --url "http://$MAHO_BROWSER_HOST:8901/" \
            --secure_base_url "http://$MAHO_BROWSER_HOST:8901/" \
            --use_secure 0 \
            --use_secure_admin 0 \
            --admin_lastname admin \
            --admin_firstname admin \
            --admin_email admin@admin.com \
            --admin_username admin \
            --admin_password asdasdasd123123123 \
            --sample_data 1
          ./maho index:reindex:all
          ./maho cache:flush

      - name: Start built-in web server
        run: |
          php -S 127.0.0.1:8080 -t public > /tmp/php-server.log 2>&1 < /dev/null &
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/api/rest/v2/store-config -o /dev/null 2>&1 || \
               curl -fsS http://127.0.0.1:8080/ -o /dev/null 2>&1; then
              echo "Web server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Web server did not start in time"
          cat /tmp/php-server.log
          exit 1

      - name: Configure PayPal sandbox credentials
        run: |
          if [ -z "$PAYPAL_SANDBOX_CLIENT_ID" ] || [ -z "$PAYPAL_SANDBOX_CLIENT_SECRET" ]; then
            echo "PayPal sandbox credentials unavailable (e.g. a fork PR); leaving PayPal unconfigured so its tests skip."
            exit 0
          fi
          ./maho config:set paypal/credentials/client_id "$PAYPAL_SANDBOX_CLIENT_ID" --encrypt --scope default --scope-id 0 --silent >/dev/null
          ./maho config:set paypal/credentials/client_secret "$PAYPAL_SANDBOX_CLIENT_SECRET" --encrypt --scope default --scope-id 0 --silent >/dev/null
          ./maho config:set paypal/credentials/sandbox 1 --scope default --scope-id 0 --silent
          ./maho config:set payment/paypal_standard_checkout/active 1 --scope default --scope-id 0 --silent
          ./maho config:set payment/paypal_advanced_checkout/active 1 --scope default --scope-id 0 --silent
          ./maho cache:flush
        env:
          PAYPAL_SANDBOX_CLIENT_ID: ${{ secrets.PAYPAL_SANDBOX_CLIENT_ID }}
          PAYPAL_SANDBOX_CLIENT_SECRET: ${{ secrets.PAYPAL_SANDBOX_CLIENT_SECRET }}

      - name: Run Pest Tests
        env:
          API_BASE_URL: http://127.0.0.1:8080
          PAYPAL_SANDBOX_CLIENT_ID: ${{ secrets.PAYPAL_SANDBOX_CLIENT_ID }}
          PAYPAL_SANDBOX_CLIENT_SECRET: ${{ secrets.PAYPAL_SANDBOX_CLIENT_SECRET }}
        run: ./vendor/bin/pest --display-errors --display-warnings
