name: Schema Migration

# Installs Maho on the `main` branch (legacy imperative SQL), then runs the PR
# branch's `./maho migrate` against that live database and asserts the migration:
#   1. succeeds,
#   2. is idempotent (a second run applies zero statements), and
#   3. lands on a schema byte-identical to a fresh declarative install.
# Wall-clock time for the migration is recorded in the job summary for each engine.

on:
  pull_request:
  workflow_dispatch:

jobs:
  migrate-db:
    name: Schema Migration (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mysql-8.4
            db_engine: mysql
            db_image: mysql:8.4
            db_user: root
            db_pass: root
            health_cmd: mysqladmin ping
            db_command: --log-bin --gtid-mode=ON --enforce-gtid-consistency=ON
          - name: mysql-latest
            db_engine: mysql
            db_image: mysql:latest
            db_user: root
            db_pass: root
            health_cmd: mysqladmin ping
            db_command: --log-bin --gtid-mode=ON --enforce-gtid-consistency=ON
          - name: mariadb-10.11
            db_engine: mysql
            db_image: mariadb:10.11
            db_user: root
            db_pass: root
            health_cmd: healthcheck.sh --connect --innodb_initialized
            db_command: --skip-name-resolve
          - name: mariadb-latest
            db_engine: mysql
            db_image: mariadb:latest
            db_user: root
            db_pass: root
            health_cmd: healthcheck.sh --connect --innodb_initialized
            db_command: --skip-name-resolve
          - name: pgsql-14
            db_engine: pgsql
            db_image: postgres:14
            db_user: postgres
            db_pass: postgres
            health_cmd: pg_isready
            db_command: postgres
          - name: pgsql-latest
            db_engine: pgsql
            db_image: postgres:latest
            db_user: postgres
            db_pass: postgres
            health_cmd: pg_isready
            db_command: postgres

    services:
      db:
        image: ${{ matrix.db_image }}
        command: ${{ matrix.db_command }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: maho
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: maho
        ports:
          - ${{ contains(matrix.db_image, 'postgres') && '5432:5432' || '3306:3306' }}
        options: >-
          --health-cmd="${{ matrix.health_cmd }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_ENGINE: ${{ matrix.db_engine }}
      DB_HOST: 127.0.0.1
      DB_NAME: maho
      DB_USER: ${{ matrix.db_user }}
      DB_PASS: ${{ matrix.db_pass }}

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: 8.3
          extensions: ${{ matrix.db_engine == 'pgsql' && 'pdo_pgsql' || '' }}

      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          path: _main

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies (PR)
        run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-*

      - name: Install dependencies (main)
        working-directory: _main
        run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-*

      - name: Install Maho on main (legacy schema)
        working-directory: _main
        run: |
          ./maho install \
            --license_agreement_accepted yes \
            --locale en_US \
            --timezone Europe/London \
            --default_currency USD \
            --db_host 127.0.0.1 \
            --db_name maho \
            --db_user ${{ matrix.db_user }} \
            --db_pass ${{ matrix.db_pass }} \
            --db_engine ${{ matrix.db_engine }} \
            --url http://maho.test/ \
            --secure_base_url http://maho.test/ \
            --use_secure 0 \
            --use_secure_admin 0 \
            --admin_lastname admin \
            --admin_firstname admin \
            --admin_email admin@admin.com \
            --admin_username admin \
            --admin_password asdasdasd123123123 \
            --sample_data 0

      - name: Point PR code at the main-installed database
        run: cp _main/app/etc/local.xml app/etc/local.xml

      - name: Migrate (PR code, timed)
        id: migrate
        run: |
          start=$(date +%s)
          ./maho migrate
          end=$(date +%s)
          echo "seconds=$((end - start))" >> $GITHUB_OUTPUT

      # Assert positively that the second run applied nothing, rather than
      # matching the "already up to date" wording one specific code path emits.
      - name: Assert migration is idempotent
        run: |
          out=$(./maho migrate)
          echo "$out"
          if echo "$out" | grep -q "statement(s) executed"; then
            echo "::error::Migration is not idempotent — a second run still applied statements."
            exit 1
          fi

      - name: Dump migrated schema
        run: php .github/schema-dump.php > /tmp/migrated.txt

      # Flush the cache while the migrated DB is still live, so nothing carries
      # stale compiled config into the fresh install below. The same checkout
      # serves two installs only in this test; a real deployment never does both.
      - name: Flush cache before fresh install
        run: ./maho cache:flush

      # A fresh install must start from a clean slate: an empty database AND no
      # local.xml (the installer is what writes local.xml). This checkout still
      # carries the local.xml copied in for the migrate phase, which points at
      # the database dropped below — leaving it would make every CLI command
      # bootstrap Mage against a non-existent install. Drop the DB and remove
      # the install marker together.
      - name: Reset DB
        run: |
          rm -f app/etc/local.xml
          php -r '
            $engine = getenv("DB_ENGINE");
            $user = getenv("DB_USER");
            $pass = getenv("DB_PASS");
            $dsn = $engine === "pgsql"
              ? "pgsql:host=127.0.0.1;dbname=postgres"
              : "mysql:host=127.0.0.1";
            $pdo = new PDO($dsn, $user, $pass, [PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION]);
            $pdo->exec("DROP DATABASE IF EXISTS maho");
            $pdo->exec("CREATE DATABASE maho");
          '

      - name: Install Maho fresh on PR (declarative schema)
        run: |
          ./maho install \
            --license_agreement_accepted yes \
            --locale en_US \
            --timezone Europe/London \
            --default_currency USD \
            --db_host 127.0.0.1 \
            --db_name maho \
            --db_user ${{ matrix.db_user }} \
            --db_pass ${{ matrix.db_pass }} \
            --db_engine ${{ matrix.db_engine }} \
            --url http://maho.test/ \
            --secure_base_url http://maho.test/ \
            --use_secure 0 \
            --use_secure_admin 0 \
            --admin_lastname admin \
            --admin_firstname admin \
            --admin_email admin@admin.com \
            --admin_username admin \
            --admin_password asdasdasd123123123 \
            --sample_data 0

      - name: Dump fresh schema
        run: php .github/schema-dump.php > /tmp/fresh.txt

      - name: Compare migrated vs fresh
        run: |
          if ! diff -u /tmp/fresh.txt /tmp/migrated.txt > /tmp/schema.diff; then
            echo "::error::Migrated schema differs from a fresh declarative install."
            echo "::group::diff -u fresh migrated"
            cat /tmp/schema.diff
            echo "::endgroup::"
            exit 1
          fi
          echo "Migration parity: OK"

      - name: Record timing
        if: always()
        run: |
          echo "### Migration timing — ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`./maho migrate\` wall-clock: **${{ steps.migrate.outputs.seconds || 'n/a' }}s**" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: schema-migration-${{ matrix.name }}
          path: |
            /tmp/migrated.txt
            /tmp/fresh.txt
            /tmp/schema.diff

  migrate-sqlite:
    name: Schema Migration (sqlite)
    runs-on: ubuntu-latest

    env:
      DB_ENGINE: sqlite

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.1
        with:
          php-version: 8.3
          extensions: pdo_sqlite

      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          path: _main

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies (PR)
        run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-*

      - name: Install dependencies (main)
        working-directory: _main
        run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-*

      - name: Install Maho on main (legacy schema)
        working-directory: _main
        run: |
          ./maho install \
            --license_agreement_accepted yes \
            --locale en_US \
            --timezone Europe/London \
            --default_currency USD \
            --db_name /tmp/migrate.sqlite \
            --db_engine sqlite \
            --url http://maho.test/ \
            --secure_base_url http://maho.test/ \
            --use_secure 0 \
            --use_secure_admin 0 \
            --admin_lastname admin \
            --admin_firstname admin \
            --admin_email admin@admin.com \
            --admin_username admin \
            --admin_password asdasdasd123123123 \
            --sample_data 0

      - name: Point PR code at the main-installed database
        run: cp _main/app/etc/local.xml app/etc/local.xml

      # SQLite can't ALTER column types or foreign keys in place, so plan()
      # reconciles each changed SQLite table by recreating it to the declarative
      # target (Applier::sqliteRebuildTable), preserving the data of every shared
      # column. The migration must therefore succeed, be idempotent, and land
      # byte-identical to a fresh declarative install — same invariant as the
      # other engines.
      - name: Migrate (PR code, timed)
        id: migrate
        env:
          DB_NAME: /tmp/migrate.sqlite
        run: |
          start=$(date +%s)
          ./maho migrate
          end=$(date +%s)
          echo "seconds=$((end - start))" >> $GITHUB_OUTPUT

      # Assert positively that the second run applied nothing, rather than
      # matching the "already up to date" wording one specific code path emits.
      - name: Assert migration is idempotent
        env:
          DB_NAME: /tmp/migrate.sqlite
        run: |
          out=$(./maho migrate)
          echo "$out"
          if echo "$out" | grep -q "statement(s) executed"; then
            echo "::error::Migration is not idempotent — a second run still applied statements."
            exit 1
          fi

      - name: Dump migrated schema
        env:
          DB_NAME: /tmp/migrate.sqlite
        run: php .github/schema-dump.php > /tmp/migrated.txt

      - name: Flush cache before fresh install
        env:
          DB_NAME: /tmp/migrate.sqlite
        run: ./maho cache:flush

      # A fresh install must start from a clean slate: no leftover database file
      # and no local.xml (the installer writes it). The local.xml copied in for
      # the migrate phase points at the database file removed here.
      - name: Reset DB
        run: |
          rm -f app/etc/local.xml
          rm -f /tmp/migrate.sqlite

      - name: Install Maho fresh on PR (declarative schema)
        run: |
          ./maho install \
            --license_agreement_accepted yes \
            --locale en_US \
            --timezone Europe/London \
            --default_currency USD \
            --db_name /tmp/fresh.sqlite \
            --db_engine sqlite \
            --url http://maho.test/ \
            --secure_base_url http://maho.test/ \
            --use_secure 0 \
            --use_secure_admin 0 \
            --admin_lastname admin \
            --admin_firstname admin \
            --admin_email admin@admin.com \
            --admin_username admin \
            --admin_password asdasdasd123123123 \
            --sample_data 0

      - name: Dump fresh schema
        env:
          DB_NAME: /tmp/fresh.sqlite
        run: php .github/schema-dump.php > /tmp/fresh.txt

      - name: Compare migrated vs fresh
        run: |
          if ! diff -u /tmp/fresh.txt /tmp/migrated.txt > /tmp/schema.diff; then
            echo "::error::Migrated schema differs from a fresh declarative install."
            echo "::group::diff -u fresh migrated"
            cat /tmp/schema.diff
            echo "::endgroup::"
            exit 1
          fi
          echo "Migration parity: OK"

      - name: Record timing
        if: always()
        run: |
          echo "### Migration timing — sqlite" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`./maho migrate\` wall-clock: **${{ steps.migrate.outputs.seconds || 'n/a' }}s**" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: schema-migration-sqlite
          path: |
            /tmp/migrated.txt
            /tmp/fresh.txt
