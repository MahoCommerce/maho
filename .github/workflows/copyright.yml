name: Copyright Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-copyright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Skip OM commits
        if: github.event_name == 'push'
        id: skip_check
        run: |
          COMMIT_MSG=$(git log --format=%B -n 1 ${{ github.sha }})
          if [[ "$COMMIT_MSG" =~ ^OM\ PR ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Get changed files
        id: changed-files
        if: github.event_name == 'pull_request' || steps.skip_check.outputs.skip != 'true'
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6

      - name: Check SPDX header in modified files
        if: github.event_name == 'pull_request' || steps.skip_check.outputs.skip != 'true'
        shell: bash
        run: |
          # Initialize error flag
          ERROR=0

          # List of files to ignore
          ignore="
          .phpcs.xml
          .php-cs-fixer.php
          .rector.php
          "

          # Loop through each modified file
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            # Skip if file doesn't exist (was deleted)
            if [ ! -f "$file" ]; then
              continue
            fi

            # Only check files with specific extensions
            extension="${file##*.}"
            if ! [[ "${extension,,}" =~ ^(js|php|phtml)$ ]]; then
              continue
            fi

            # Check ignored files
            if $( echo $ignore | grep -w -q $file ); then
                continue;
            fi

            # Each source file must carry a well-formed SPDX header.
            # We don't claim Maho copyright on existing files (git history is the
            # attribution log), so only the header's presence is enforced here.
            if ! grep -q "SPDX-FileCopyrightText:" "$file" || ! grep -q "SPDX-License-Identifier:" "$file"; then
              echo "❌ Missing SPDX header in: $file"
              echo "   Expected an 'SPDX-FileCopyrightText:' line and an 'SPDX-License-Identifier:' line."
              ERROR=1
            fi
          done

          # Exit with error if any file is missing its SPDX header
          if [ $ERROR -eq 1 ]; then
            echo "❌ Error: Some files are missing the required SPDX header"
            exit 1
          fi

          echo "✅ Success: All modified files contain a valid SPDX header"
