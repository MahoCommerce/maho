name: Browser Net Diagnostic

# Temporary: figure out why Playwright's run-server Chromium can't reach the Maho
# server in GitHub Actions (ERR_NAME_NOT_RESOLVED). Delete once resolved.
on:
  push:
    branches:
      - fix/checkout-quote-currency-985
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: pdo_sqlite

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-*

      - name: Install Maho (sqlite, localhost:8901)
        run: |
          ./maho install \
            --license_agreement_accepted yes \
            --locale en_US --timezone Europe/London --default_currency USD \
            --db_name maho.sqlite --db_engine sqlite \
            --url http://localhost:8901/ --secure_base_url http://localhost:8901/ \
            --use_secure 0 --use_secure_admin 0 \
            --admin_lastname admin --admin_firstname admin --admin_email admin@admin.com \
            --admin_username admin --admin_password asdasdasd123123123 --sample_data 1
          ./maho index:reindex:all
          ./maho cache:flush

      - name: Serve and curl what Maho returns
        run: |
          PHP_CLI_SERVER_WORKERS=8 ./maho serve 8901 >/tmp/serve.log 2>&1 &
          until (echo > /dev/tcp/127.0.0.1/8901) 2>/dev/null; do sleep 0.3; done
          echo "server up. configured base urls:"
          ./maho config:get web/unsecure/base_url 2>/dev/null || true
          ./maho config:get web/secure/base_url 2>/dev/null || true
          PID=$(./maho db:query "SELECT entity_id FROM catalog_product_entity LIMIT 1" 2>/dev/null | tail -1)
          echo "=== GET / (homepage) headers ==="
          curl -is http://localhost:8901/ | head -25
          echo "=== GET /catalog/product/view/id/337/ headers ==="
          curl -is http://localhost:8901/catalog/product/view/id/337/ | head -25
          echo "=== follow redirects (-L) final effective url for homepage ==="
          curl -s -o /dev/null -L -w "final: %{url_effective} (http %{http_code}, redirects %{num_redirects})\n" http://localhost:8901/
