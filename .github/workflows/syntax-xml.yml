name: XML Syntax

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax_xml:
    name: XML Syntax
    runs-on: [ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Get last successful commit
        id: last-successful-commit
        uses: SamhammerAG/last-successful-build-action@c32fe86b51dd1479ea281d29767d09288458d120 # v7
        with:
          branch: main
          workflow: ${{ github.workflow }}
          verify: true

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          base_sha: ${{ steps.last-successful-commit.outputs.sha }}
          files: |
            **/*.xml

      - name: Update APT repositories
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: "sudo apt update"

      - name: Install xmllint
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: "sudo apt-get -y install libxml2-utils"

      - name: Check changed files
        if: ${{ steps.changed-files.outputs.any_changed == 'true' }}
        run: |
          set +e
          ERROR=0
          for FILE in ${{ steps.changed-files.outputs.all_changed_files }}; do
              MESSAGE=$(xmllint --noout "$FILE" 2>&1)
              if [ $? -ne 0 ]; then
                  ERROR=255
                  LINE=$(echo "$MESSAGE" | head -n 1 | cut -d":" -f 2)
                  echo "::error file=$FILE,line=$LINE::$MESSAGE"
              fi
          done
          exit $ERROR
