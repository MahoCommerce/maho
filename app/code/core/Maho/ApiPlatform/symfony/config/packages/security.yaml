security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        maho_customer:
            id: Maho\ApiPlatform\Security\CustomerUserProvider
        maho_admin:
            id: Maho\ApiPlatform\Security\AdminUserProvider
        maho_chain:
            chain:
                providers: [maho_admin, maho_customer]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api_docs:
            pattern: ^/api/docs
            security: false

        # Admin GraphQL endpoint - authenticated via admin session or bridge token
        api_admin_graphql:
            pattern: ^/api/admin/graphql
            stateless: true
            provider: maho_admin
            custom_authenticators:
                - Maho\ApiPlatform\Security\AdminSessionAuthenticator

        # Public GraphQL endpoint - OAuth2 auth
        api_graphql:
            pattern: ^/api/graphql
            stateless: true
            provider: maho_customer
            custom_authenticators:
                - Maho\ApiPlatform\Security\OAuth2Authenticator

        # REST API - OAuth2 authenticated (optional — unauthenticated requests pass through)
        api:
            pattern: ^/api
            stateless: true
            provider: maho_chain
            custom_authenticators:
                - Maho\ApiPlatform\Security\OAuth2Authenticator

    access_control:
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/graphql, roles: PUBLIC_ACCESS }
        - { path: ^/api/admin/graphql, roles: IS_AUTHENTICATED_FULLY }
        # All REST API authorization is handled per-operation via #[ApiResource(security: ...)]
        - { path: ^/api, roles: PUBLIC_ACCESS }
